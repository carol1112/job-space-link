<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Login | Job Space Link</title>

<link rel="stylesheet" href="jobspacelink.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase_config.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Poppins","Segoe UI",sans-serif;
}

body{
  min-height:100vh;
  background:radial-gradient(circle at 20% 20%, #0ea5e9, #1e1b4b 60%, #020617);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#e5e7eb;
  overflow-x:hidden;
}

/* CARD */
.card{
  width:420px;
  max-width:calc(100vw - 24px);
  background:rgba(15,23,42,0.92);
  padding:32px;
  border-radius:18px;
  border:1px solid rgba(59,130,246,0.4);
  backdrop-filter:blur(14px);
  box-shadow:0 0 35px rgba(15,23,42,0.85);
  margin-top:90px;
}

h1{
  text-align:center;
  color:#38bdf8;
  margin-bottom:12px;
  text-shadow:0 0 12px rgba(56,189,248,0.7);
  font-size:1.55rem;
}

p{
  text-align:center;
  opacity:0.8;
  margin-bottom:22px;
  font-size:0.95rem;
}

label{
  display:block;
  margin:14px 0 6px;
  font-size:0.85rem;
}

input{
  width:100%;
  padding:12px;
  border-radius:12px;
  background:rgba(2,6,23,0.7);
  border:1px solid rgba(255,255,255,0.15);
  color:#fff;
  font-size:0.95rem;
}

input:focus{
  outline:none;
  border-color:#0ea5e9;
  box-shadow:0 0 12px rgba(56,189,248,0.55);
}

button.login-btn{
  width:100%;
  margin-top:22px;
  padding:14px;
  border-radius:14px;
  border:none;
  font-weight:600;
  cursor:pointer;
  color:#fff;
  background:linear-gradient(135deg,#0ea5e9,#7c3aed);
  box-shadow:0 0 25px rgba(56,189,248,0.55);
  transition:0.25s;
  font-size:0.98rem;
}
button.login-btn:hover:not(:disabled){
  transform:translateY(-1px);
  box-shadow:0 0 30px rgba(129,140,248,0.7);
}
button.login-btn:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

.footer{
  text-align:center;
  margin-top:16px;
  font-size:0.8rem;
  opacity:0.6;
}

/* ========= POST-LOGIN CHOICE OVERLAY ========= */
.choice-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  padding:18px;
}
.choice-card{
  width:100%;
  max-width:460px;
  background:rgba(15,23,42,0.96);
  border-radius:20px;
  border:1px solid rgba(59,130,246,0.7);
  box-shadow:0 0 30px rgba(37,99,235,0.7);
  padding:26px 30px 24px;
  text-align:center;
}
.choice-card h2{
  font-size:1.3rem;
  margin-bottom:8px;
  color:#e0f2fe;
}
.choice-card p{
  font-size:0.9rem;
  margin-bottom:16px;
  opacity:0.9;
}
.choice-buttons{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.choice-btn{
  padding:10px 14px;
  border-radius:999px;
  border:none;
  cursor:pointer;
  font-size:0.9rem;
  font-weight:600;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  background:linear-gradient(90deg,#00c6ff,#7c3aed,#00c6ff);
  background-size:200%;
  color:#fff;
  box-shadow:0 0 18px rgba(59,130,246,0.55);
  transition:0.3s;
}
.choice-btn.secondary{
  background:linear-gradient(90deg,#22c55e,#16a34a,#22c55e);
  box-shadow:0 0 16px rgba(34,197,94,0.65);
}
.choice-btn.match-email{
  background:linear-gradient(90deg,#f59e0b,#ef4444,#f59e0b);
  background-size:200%;
  box-shadow:0 0 16px rgba(245,158,11,0.55);
}
.choice-btn:hover{
  background-position:100% 0;
  transform:translateY(-1px);
}

/* ============================================================
   MEDIA QUERIES
============================================================ */
@media (min-width:1800px){
  body{ padding:0 24px; }

  .card{
    width:520px;
    padding:42px;
    border-radius:22px;
    margin-top:110px;
  }
  h1{ font-size:1.9rem; }
  p{ font-size:1.02rem; }
  label{ font-size:0.95rem; }
  input{ padding:14px; font-size:1.05rem; border-radius:14px; }
  button.login-btn{ padding:16px; font-size:1.08rem; border-radius:16px; }

  .choice-card{
    max-width:520px;
    padding:34px 36px 32px;
    border-radius:24px;
  }
  .choice-card h2{ font-size:1.55rem; }
  .choice-card p{ font-size:1rem; }
  .choice-btn{ padding:12px 16px; font-size:1rem; }
}

@media (min-width:1440px){
  .card{
    width:460px;
    padding:36px;
    margin-top:100px;
  }
  h1{ font-size:1.7rem; }
  .choice-card{ max-width:500px; }
}

@media (min-width:769px) and (max-width:1023px){
  body{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:0 14px;
  }

  .card{
    width:460px;
    max-width:100%;
    margin:90px auto 0;
    padding:20px 18px;
    border-radius:14px;
  }

  h1{ font-size:1.32rem; }
  p{ font-size:0.88rem; line-height:1; }

  input{
    padding:10px 10px;
    font-size:0.9rem;
  }

  button.login-btn{
    padding:10px;
    font-size:0.92rem;
  }
}

@media (min-width:481px) and (max-width:768px){
  body{
    align-items:flex-start;
    padding:0 12px;
  }
  .card{
    width:100%;
    margin-top:115px;
    padding:22px 18px;
    border-radius:16px;
  }
  h1{ font-size:1.38rem; }
  p{ font-size:0.9rem; margin-bottom:16px; }

  label{ margin:12px 0 6px; }
  input{ padding:12px; font-size:1rem; }
  button.login-btn{ padding:14px; font-size:1rem; }

  .choice-card{
    max-width:520px;
    padding:22px 18px 18px;
    border-radius:18px;
  }
  .choice-btn{ padding:12px 14px; font-size:0.95rem; }
}

@media (max-width:480px){
  body{
    align-items:flex-start;
    padding:0 8px;
  }

  .card{
    width:100%;
    margin-top:105px;
    padding:18px 14px;
    border-radius:16px;
  }

  h1{ font-size:1.22rem; }
  p{ font-size:0.86rem; margin-bottom:14px; }

  label{ font-size:0.82rem; margin:10px 0 6px; }

  input{
    padding:12px 12px;
    font-size:16px;
    border-radius:12px;
  }

  button.login-btn{
    padding:13px 14px;
    font-size:1rem;
    border-radius:14px;
  }

  .footer{ font-size:0.78rem; }

  .choice-overlay{ padding:12px; }
  .choice-card{
    max-width:100%;
    padding:18px 14px 16px;
    border-radius:16px;
  }
  .choice-card h2{ font-size:1.15rem; }
  .choice-card p{ font-size:0.86rem; }
  .choice-btn{
    padding:12px 14px;
    font-size:0.92rem;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="JOBSPACELINK logo3.png" alt="Job Space Link Logo" />
  </div>

  <nav>
    <a href="index.html">Home</a>

    <div class="nav-dropdown" id="aboutNavDropdown">
      <a href="about.html" id="aboutNavLink">
        About <i class="fa-solid fa-caret-down nav-caret"></i>
      </a>
      <div class="nav-dropdown-menu" id="aboutNavMenu">
        <a href="why choose us.html"><i class="fa-solid fa-circle-check"></i> Why Choose Us</a>
        <a href="how it works.html"><i class="fa-solid fa-diagram-project"></i> How It Works</a>
      </div>
    </div>

    <a href="postedhiring.html">Job Hiring</a>
    <a href="postjob.html">Post Jobs</a>
    <a href="applicantform.html?source=jobspacelink">Post Resume</a>
  </nav>

  <div class="auth-buttons">
    <div class="dropdown" id="employerDropdown">
      <a href="#" id="employerToggle" class="login dropdown-toggle">
        <i class="fa-solid fa-user-lock"></i> Employer
        <i class="fa-solid fa-caret-down caret-icon"></i>
      </a>
      <div class="dropdown-menu" id="employerMenu">
        <a href="loginemployer.html"><i class="fa-solid fa-right-to-bracket"></i> Employer Login</a>
        <a href="subscribe.html"><i class="fa-solid fa-credit-card"></i> Subscribe</a>
        <a href="subscriptionstatus.html"><i class="fa-solid fa-list-check"></i> Subscription Status</a>
      </div>
    </div>
    <a href="loginjobseeker.html" class="admin"><i class="fa-solid fa-user-lock"></i> Jobseeker</a>
    <a href="admin2.html" class="admin"><i class="fa-solid fa-user-lock"></i> Admin</a>
  </div>
</header>

<form class="card" id="adminLoginForm" novalidate>
  <h1><i class="fa-solid fa-user-lock"></i> Admin Login</h1>
  <p>Administrator access only</p>

  <label for="email">Email</label>
  <input id="email" type="email" placeholder="admin@email.com" autocomplete="username" />

  <label for="password">Password</label>
  <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />

  <button class="login-btn" id="loginBtn" type="submit">Login</button>
  <div class="footer">Admins only</div>
</form>

<div id="choiceOverlay" class="choice-overlay" aria-hidden="true">
  <div class="choice-card" role="dialog" aria-modal="true" aria-label="Admin Portal">
    <h2><i class="fa-solid fa-gauge-high"></i> Admin Portal</h2>
    <p>Select what you want to do after login.</p>

    <div class="choice-buttons">
      <button id="btnViewSubs" class="choice-btn" type="button">
        <i class="fa-solid fa-table-list"></i>
        View Employer Subscription Records
      </button>

      <button id="btnBulkEmail" class="choice-btn secondary" type="button">
        <i class="fa-solid fa-envelope-circle-check"></i>
        Send Admin Bulk Messages
      </button>

      <button id="btnMatchEmail" class="choice-btn match-email" type="button">
        <i class="fa-solid fa-envelopes-bulk"></i>
        Admin Match Email
      </button>
    </div>
  </div>
</div>

<script>
const sb = window.sbClient || window.supabaseClient || window.supabase;

const adminLoginForm = document.getElementById("adminLoginForm");
const loginBtn       = document.getElementById("loginBtn");
const choiceOverlay  = document.getElementById("choiceOverlay");
const btnViewSubs    = document.getElementById("btnViewSubs");
const btnBulkEmail   = document.getElementById("btnBulkEmail");
const btnMatchEmail  = document.getElementById("btnMatchEmail");

const emailEl        = document.getElementById("email");
const passEl         = document.getElementById("password");
const loginCard      = document.getElementById("adminLoginForm");

let overlayOpen = false;
let isSubmitting = false;
let lastFocusedBeforeOverlay = null;

/* =========================
   HEADER DROPDOWNS
========================= */
function initHeaderDropdowns(){
  const aboutLink = document.getElementById("aboutNavLink");
  const aboutMenu = document.getElementById("aboutNavMenu");
  const aboutWrap = document.getElementById("aboutNavDropdown");

  const employerToggle = document.getElementById("employerToggle");
  const employerMenu = document.getElementById("employerMenu");
  const employerWrap = document.getElementById("employerDropdown");

  function closeAll(){
    if (aboutMenu) aboutMenu.classList.remove("show");
    if (employerMenu) employerMenu.classList.remove("show");
  }

  if (aboutLink && aboutMenu){
    aboutLink.addEventListener("click", (e) => {
      e.preventDefault();
      const isOpen = aboutMenu.classList.contains("show");
      closeAll();
      if (!isOpen) aboutMenu.classList.add("show");
    });
  }

  if (employerToggle && employerMenu){
    employerToggle.addEventListener("click", (e) => {
      e.preventDefault();
      const isOpen = employerMenu.classList.contains("show");
      closeAll();
      if (!isOpen) employerMenu.classList.add("show");
    });
  }

  document.addEventListener("click", (e) => {
    const t = e.target;
    const inAbout = aboutWrap && aboutWrap.contains(t);
    const inEmployer = employerWrap && employerWrap.contains(t);
    if (!inAbout && !inEmployer) closeAll();
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && !overlayOpen){
      closeAll();
    }
  });
}

/* =========================
   OVERLAY HELPERS
========================= */
function showChoiceOverlay(){
  overlayOpen = true;
  choiceOverlay.style.display = "flex";
  choiceOverlay.setAttribute("aria-hidden", "false");
  document.body.style.overflow = "hidden";

  lastFocusedBeforeOverlay = document.activeElement;
  setTimeout(() => btnViewSubs.focus(), 0);
}

function hideChoiceOverlay(){
  overlayOpen = false;
  choiceOverlay.style.display = "none";
  choiceOverlay.setAttribute("aria-hidden", "true");
  document.body.style.overflow = "";

  if (lastFocusedBeforeOverlay && typeof lastFocusedBeforeOverlay.focus === "function"){
    lastFocusedBeforeOverlay.focus();
  } else {
    emailEl.focus();
  }
}

/* =========================
   LOGIN BUTTON STATE
========================= */
function setLoginButtonState(isLoading){
  loginBtn.disabled = !!isLoading;
  loginBtn.textContent = isLoading ? "Signing in..." : "Login";
}

/* =========================
   OVERLAY NAVIGATION
========================= */
function getOverlayButtons(){
  return [btnViewSubs, btnBulkEmail, btnMatchEmail].filter(Boolean);
}
function focusOverlayIndex(i){
  const btns = getOverlayButtons();
  if (!btns.length) return;
  const idx = (i + btns.length) % btns.length;
  btns[idx].focus();
}
function getFocusedOverlayIndex(){
  const btns = getOverlayButtons();
  return btns.indexOf(document.activeElement);
}

btnViewSubs.addEventListener("click", () => {
  window.location.href = "subscriptionrecord.html";
});

btnBulkEmail.addEventListener("click", () => {
  window.location.href = "email4.html";
});

btnMatchEmail.addEventListener("click", () => {
  window.location.href = "admin_match_email.html";
});

choiceOverlay.addEventListener("click", (e) => {
  if (e.target === choiceOverlay) hideChoiceOverlay();
});

/* =========================
   KEYBOARD HANDLING
========================= */
document.addEventListener("keydown", (e) => {
  if (overlayOpen){
    const btns = getOverlayButtons();

    if (e.key === "Escape"){
      e.preventDefault();
      hideChoiceOverlay();
      return;
    }

    if (!btns.length) return;

    if (e.key === "ArrowDown"){
      e.preventDefault();
      const idx = getFocusedOverlayIndex();
      focusOverlayIndex(idx === -1 ? 0 : idx + 1);
      return;
    }

    if (e.key === "ArrowUp"){
      e.preventDefault();
      const idx = getFocusedOverlayIndex();
      focusOverlayIndex(idx === -1 ? 0 : idx - 1);
      return;
    }

    if (e.key === "Enter"){
      const idx = getFocusedOverlayIndex();
      if (idx >= 0){
        e.preventDefault();
        btns[idx].click();
      }
      return;
    }

    if (e.key === "Tab"){
      e.preventDefault();
      const idx = getFocusedOverlayIndex();
      const next = e.shiftKey ? (idx - 1) : (idx + 1);
      focusOverlayIndex(next);
      return;
    }

    return;
  }

  if (e.key === "Enter"){
    const active = document.activeElement;

    if (active === emailEl){
      e.preventDefault();
      passEl.focus();
      return;
    }

    if (active === passEl){
      e.preventDefault();
      loginBtn.focus();
      return;
    }

    if (active === loginBtn){
      e.preventDefault();
      adminLogin();
      return;
    }

    if (loginCard.contains(active)){
      e.preventDefault();
      if (!emailEl.value.trim()) emailEl.focus();
      else if (!passEl.value) passEl.focus();
      else loginBtn.focus();
    }
  }
});

/* =========================
   AUTOFOCUS
========================= */
document.addEventListener("DOMContentLoaded", () => {
  initHeaderDropdowns();
  setTimeout(() => emailEl.focus(), 0);
});

/* =========================
   FORM SUBMIT
========================= */
adminLoginForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  await adminLogin();
});

/* =========================
   ADMIN LOGIN
========================= */
async function adminLogin(){
  if (isSubmitting) return;

  const email = emailEl.value.trim().toLowerCase();
  const password = passEl.value;

  if (!email || !password){
    alert("Email and password required");
    if (!email) emailEl.focus();
    else passEl.focus();
    return;
  }

  if (!sb || !sb.auth){
    alert("Supabase is not initialized. Check supabase_config.js");
    return;
  }

  try{
    isSubmitting = true;
    setLoginButtonState(true);

    const { error: signInError } = await sb.auth.signInWithPassword({ email, password });

    if (signInError){
      alert(signInError.message);
      passEl.focus();
      passEl.select?.();
      return;
    }

    const { data: { user }, error: userErr } = await sb.auth.getUser();

    if (userErr || !user){
      alert("Unable to retrieve user. Please try again.");
      await sb.auth.signOut();
      emailEl.focus();
      return;
    }

    const appMetaRole = String(user?.app_metadata?.role || "").toLowerCase();

    if (appMetaRole !== "admin"){
      const { data: profile, error: profErr } = await sb
        .from("profiles")
        .select("role")
        .eq("id", user.id)
        .single();

      if (profErr || String(profile?.role || "").toLowerCase() !== "admin"){
        alert("Access denied: Admins only");
        await sb.auth.signOut();
        emailEl.focus();
        return;
      }
    }

    showChoiceOverlay();

  }catch(err){
    console.error("Admin login error:", err);
    alert("Unexpected error during admin login.");
  }finally{
    isSubmitting = false;
    setLoginButtonState(false);
  }
}
</script>

</body>
</html>
