<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password | Job Space Link</title>

<!-- ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
<link rel="stylesheet" href="jobspacelink.css" />
<!-- LOAD SUPABASE + GLOBAL CLIENT -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase_config.js"></script>

<style>
 
/* ===== RESET BOX ===== */
.reset-container{
  max-width:420px;
  margin:180px auto 0;
  background:rgba(15,23,42,0.9);
  border:2px solid rgba(59,130,246,0.4);
  border-radius:20px;
  box-shadow:0 0 25px rgba(59,130,246,0.3), inset 0 0 20px rgba(147,51,234,0.15);
  padding:45px 40px;
  text-align:center;
}
.reset-container h2{
  font-size:1.8rem;
  font-weight:700;
  margin-bottom:15px;
  color:#c0ff33;
  text-shadow:0 0 10px rgba(147,51,234,0.7);
}
.reset-container p{
  font-size:0.95rem;
  color:#dbeafe;
  margin-bottom:25px;
}
.reset-container input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1.5px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.05);
  color:#f1f5f9;
  font-size:0.95rem;
  margin-bottom:20px;
}
.reset-container button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#00c6ff,#8b5cf6,#00c6ff);
  background-size:200%;
  color:white;
  font-size:1rem;
  font-weight:600;
  cursor:pointer;
}
.message{
  margin-top:15px;
  font-size:0.9rem;
  color:#22c55e;
  display:none;
}
.error{
  color:#ef4444;
  margin-top:15px;
  font-size:0.9rem;
}
</style>
</head>

<body>

<header>
    <div class="logo">
      <img src="JOBSPACELINK2.png" alt="Job Space Link Logo" />
    </div>

    <nav>
      <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
      <a href="postjob.html"><i class="fa-solid fa-briefcase"></i> Post Jobs</a>
      <a href="postedhiring.html"><i class="fa-solid fa-users"></i> Job Hiring</a>
      <a href="applicantform.html"><i class="fa-solid fa-paper-plane"></i> Post Resume</a>
    </nav>

    <div class="auth-buttons">
      <a href="login.html" class="login"><i class="fa-solid fa-right-to-bracket"></i> Login</a>
      <a href="signup2.html" class="signup"><i class="fa-solid fa-user-plus"></i> Sign Up</a>
    </div>
  </header>
<div class="reset-container">
  <h2><i class="fa-solid fa-key"></i> Forgot Password?</h2>
  <p>Enter your registered email and we’ll send you a reset link.</p>

  <form id="resetRequestForm">
    <input type="email" id="email" placeholder="Enter your email" required>
    <button type="submit"><i class="fa-solid fa-paper-plane"></i> Send Reset Link</button>

    <p class="error" id="errorMsg"></p>
    <p class="message" id="successMsg">✅ A reset link has been sent to your email.</p>
  </form>
</div>

<script>
// -----------------------------
// USE GLOBAL SUPABASE INSTANCE
// -----------------------------
const supabase = window.supabase;

const form = document.getElementById("resetRequestForm");
const errorMsg = document.getElementById("errorMsg");
const successMsg = document.getElementById("successMsg");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value.trim();
  errorMsg.textContent = "";
  successMsg.style.display = "none";

  // ⭐ Replace redirectTo with your actual reset page
  const { error } = await supabase.auth.resetPasswordForEmail(email, {
    redirectTo: "https:/reset2.html"
  });

  if (error) {
    errorMsg.textContent = "❌ " + error.message;
    return;
  }

  successMsg.style.display = "block";
});
</script>

</body>
</html>
