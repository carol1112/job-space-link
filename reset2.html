<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset Password | Job Space Link</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<link rel="stylesheet" href="jobspacelink.css" />

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Poppins",sans-serif;
}

:root{
  --header-h:78px;
}

html, body{
  margin:0;
  padding:0;
  overflow-x:hidden;
  min-height:100%;
}

html{
  scroll-behavior:smooth;
  scroll-padding-top:calc(var(--header-h) + 16px);
}

body{
  min-height:100vh;
  padding-top:var(--header-h);
  background:radial-gradient(circle at 20% 20%, #0ea5e9, #1e1b4b 60%, #020617);
  color:white;
}

/* ============================================================
   HEADER - INDEX STYLE
============================================================ */
header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:var(--header-h);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:0 16px 0 8px;
  background:rgba(15,23,42,0.92);
  border-bottom:1px solid rgba(59,130,246,0.28);
  backdrop-filter:blur(14px);
  box-shadow:0 8px 24px rgba(0,0,0,0.18);
  z-index:1500;
}

header .logo{
  flex:0 0 auto;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  margin-left:-4px;
}

header .logo img{
  height:80px;
  width:auto;
  display:block;
  object-fit:contain;
  filter:drop-shadow(0 0 8px rgba(0,198,255,0.35));
}

header nav{
  flex:1 1 auto;
  min-width:0;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:12px;
  margin-left:4px;
  white-space:nowrap;
}

header nav > a,
header nav .nav-main-link{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  height:36px;
  padding:0 4px;
  color:#e5e7eb;
  text-decoration:none;
  font-size:0.88rem;
  font-weight:600;
  transition:color 0.25s ease, text-shadow 0.25s ease;
}

header nav > a:hover,
header nav .nav-main-link:hover{
  color:#ffffff;
  text-shadow:0 0 12px rgba(0,198,255,0.55);
}

header .auth-buttons{
  flex:0 0 auto;
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:8px;
  white-space:nowrap;
}

header .auth-buttons a{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  height:36px;
  padding:0 11px;
  border-radius:10px;
  text-decoration:none;
  font-size:0.82rem;
  font-weight:700;
  color:#ffffff;
  border:1px solid rgba(255,255,255,0.14);
  background:linear-gradient(135deg, rgba(0,198,255,0.22), rgba(139,92,246,0.22));
  box-shadow:0 0 14px rgba(0,198,255,0.10);
  transition:transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
}

header .auth-buttons a:hover{
  transform:translateY(-2px);
  box-shadow:0 0 20px rgba(0,198,255,0.22);
  border-color:rgba(0,198,255,0.35);
}

.nav-toggle{
  display:none;
  width:40px;
  height:40px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg, rgba(0,198,255,0.22), rgba(139,92,246,0.22));
  color:#fff;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  flex:0 0 auto;
  border:1px solid rgba(255,255,255,0.14);
  box-shadow:0 0 14px rgba(0,198,255,0.10);
}

.nav-toggle i{
  font-size:1rem;
}

.mobile-panel{
  position:fixed;
  top:var(--header-h);
  left:0;
  right:0;
  background:rgba(15,23,42,0.97);
  border-top:1px solid rgba(59,130,246,0.25);
  border-bottom:1px solid rgba(59,130,246,0.25);
  box-shadow:0 10px 28px rgba(0,0,0,0.28);
  backdrop-filter:blur(12px);
  padding:14px 16px 18px;
  transform:translateY(-10px);
  opacity:0;
  pointer-events:none;
  transition:opacity 0.25s ease, transform 0.25s ease;
  z-index:1400;
}

.mobile-panel.open{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

.mobile-panel .mnav{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.mobile-panel .mnav a{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:12px 14px;
  border-radius:12px;
  text-decoration:none;
  color:#e5e7eb;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  font-weight:600;
  transition:background 0.25s ease, color 0.25s ease, transform 0.25s ease;
}

.mobile-panel .mnav a:hover{
  background:rgba(0,198,255,0.12);
  color:#fff;
  transform:translateX(3px);
}

.mobile-panel .mnav-group{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.mobile-panel .mnav-row{
  display:flex;
  align-items:center;
  gap:8px;
}

.mobile-panel .mnav-main-link{
  flex:1 1 auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:12px 14px;
  border-radius:12px;
  text-decoration:none;
  color:#e5e7eb;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  font-weight:600;
  transition:background 0.25s ease, color 0.25s ease, transform 0.25s ease;
}

.mobile-panel .mnav-main-link:hover{
  background:rgba(0,198,255,0.12);
  color:#fff;
  transform:translateX(3px);
}

.mobile-panel .mnav-toggle{
  flex:0 0 48px;
  width:48px;
  min-width:48px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  padding:12px 14px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.04);
  color:#e5e7eb;
  font-weight:600;
  font-size:0.96rem;
  cursor:pointer;
  transition:background 0.25s ease, color 0.25s ease, transform 0.25s ease;
}

.mobile-panel .mnav-toggle:hover{
  background:rgba(0,198,255,0.12);
  color:#fff;
  transform:translateX(3px);
}

.mobile-panel .mnav-toggle .mnav-caret{
  transition:transform 0.25s ease;
}

.mobile-panel .mnav-group.open .mnav-toggle .mnav-caret{
  transform:rotate(180deg);
}

.mobile-panel .mnav-submenu{
  display:none;
  flex-direction:column;
  gap:8px;
  padding-left:14px;
}

.mobile-panel .mnav-group.open .mnav-submenu{
  display:flex;
}

.mobile-panel .mnav-submenu a{
  background:rgba(255,255,255,0.03);
}

.nav-dropdown{
  position:relative;
  display:inline-flex;
  align-items:center;
  height:36px;
  flex:0 0 auto;
}

.nav-dropdown-trigger{
  display:inline-flex;
  align-items:center;
  gap:2px;
  height:100%;
}

.nav-main-link{
  display:inline-flex;
  align-items:center;
  text-decoration:none;
}

.nav-dropdown-toggle{
  appearance:none;
  -webkit-appearance:none;
  border:none;
  outline:none;
  background:transparent;
  color:#ffffff;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:24px;
  height:24px;
  padding:0;
  margin:0;
  line-height:1;
}

.nav-dropdown-toggle i{
  pointer-events:none;
  color:#ffffff;
  font-size:0.9rem;
}

.nav-dropdown-menu{
  position:absolute;
  top:calc(100% + 12px);
  left:0;
  min-width:220px;
  display:none;
  flex-direction:column;
  gap:0;
  padding:10px 0;
  border-radius:14px;
  background:rgba(15,23,42,0.96);
  border:1px solid rgba(59,130,246,0.35);
  box-shadow:0 12px 34px rgba(0,0,0,0.35);
  backdrop-filter:blur(12px);
  z-index:1200;
}

.nav-dropdown.open .nav-dropdown-menu{
  display:flex;
}

.nav-dropdown-menu a{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 16px;
  color:#e5e7eb;
  text-decoration:none;
  white-space:nowrap;
  transition:background 0.25s ease, color 0.25s ease;
}

.nav-dropdown-menu a:hover{
  background:rgba(0,198,255,0.12);
  color:#ffffff;
}

.nav-dropdown-menu i{
  width:18px;
  text-align:center;
}

/* ================= RESET BOX ================= */
.reset-container{
  max-width:420px;
  margin:90px auto 0;
  background:rgba(15,23,42,0.9);
  border:2px solid rgba(59,130,246,0.4);
  border-radius:20px;
  padding:45px 40px;
  text-align:center;
  backdrop-filter:blur(15px);
  box-shadow:0 0 28px rgba(2,6,23,0.42);
}

.reset-container h2{
  font-size:1.8rem;
  margin-bottom:10px;
  color:#c0ff33;
  text-shadow:0 0 10px rgba(147,51,234,0.7);
}

.reset-container p{
  color:#e0e7ff;
  margin-bottom:25px;
}

.input-group{
  margin-bottom:20px;
  text-align:left;
  position:relative;
}

label{
  font-size:0.9rem;
  margin-bottom:6px;
  color:#e2e8f0;
  display:block;
}

.reset-container input{
  width:100%;
  padding:12px 45px 12px 12px;
  border-radius:10px;
  border:1.5px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.05);
  color:#f1f5f9;
  outline:none;
}

.reset-container input:focus{
  border-color:#38bdf8;
  box-shadow:0 0 0 3px rgba(56,189,248,0.14), 0 0 14px rgba(56,189,248,0.18);
}

.eye-toggle{
  position:absolute;
  right:12px;
  top:39px;
  cursor:pointer;
  color:#93c5fd;
  font-size:1.1rem;
}

.reset-container button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#00c6ff,#8b5cf6,#00c6ff);
  color:white;
  font-size:1rem;
  font-weight:600;
  cursor:pointer;
  transition:transform 0.25s ease, box-shadow 0.25s ease;
  box-shadow:0 0 22px rgba(56,189,248,0.20);
}

.reset-container button:hover{
  transform:translateY(-1px);
  box-shadow:0 0 28px rgba(56,189,248,0.28);
}

.message{
  margin-top:15px;
  font-size:0.9rem;
  color:#22c55e;
  display:none;
}

.error{
  color:#ef4444;
  margin-top:12px;
  font-size:0.9rem;
}

    </div>

    <div class="input-group">
      <label for="confirmPassword">Confirm Password</label>
      <input type="password" id="confirmPassword" required>
      <i class="fa-solid fa-eye eye-toggle" onclick="togglePassword('confirmPassword', this)"></i>
    </div>

    <button type="submit"><i class="fa-solid fa-key"></i> Update Password</button>

    <p class="error" id="errorMsg"></p>
    <p class="message" id="successMsg">Password updated! Redirecting...</p>

<script>
function resolveSupabaseClient(){
  const directCandidates = [
    window.sb,
    window.sbClient,
    window.supabaseClient,
    window._supabaseClient,
    window.client
  ];

  for (const c of directCandidates){
    if (c && c.auth && typeof c.auth.updateUser === "function"){
      return c;
    }
  }

  const ctor = window.supabase && typeof window.supabase.createClient === "function"
    ? window.supabase.createClient
    : null;

  const url =
    window.SUPABASE_URL ||
    window.supabaseUrl ||
    window.__SUPABASE_URL ||
    (typeof SUPABASE_URL !== "undefined" ? SUPABASE_URL : "") ||
    (typeof supabaseUrl !== "undefined" ? supabaseUrl : "");

  const key =
    window.SUPABASE_ANON_KEY ||
    window.supabaseAnonKey ||
    window.__SUPABASE_ANON_KEY ||
    (typeof SUPABASE_ANON_KEY !== "undefined" ? SUPABASE_ANON_KEY : "") ||
    (typeof supabaseAnonKey !== "undefined" ? supabaseAnonKey : "");

  if (ctor && url && key){
    const created = ctor(url, key);
    window.supabaseClient = created;
    return created;
  }

  return null;
}

const sb = resolveSupabaseClient();

function initHeaderMenus(){
  const dd = document.getElementById("aboutNavDropdown");
  const toggle = document.getElementById("aboutNavToggle");
  const menu = document.getElementById("aboutNavMenu");

  if(dd && toggle && menu){
    function closeAboutMenu(){
      dd.classList.remove("open");
      toggle.setAttribute("aria-expanded", "false");
    }

    function openAboutMenu(){
      dd.classList.add("open");
      toggle.setAttribute("aria-expanded", "true");
    }

    toggle.addEventListener("click", function(e){
      e.preventDefault();
      e.stopPropagation();

      const isOpen = dd.classList.contains("open");
      if(isOpen){
        closeAboutMenu();
      }else{
        openAboutMenu();
      }
    });

    document.addEventListener("click", function(e){
      if(!dd.contains(e.target)){
        closeAboutMenu();
      }
    });

    document.addEventListener("keydown", function(e){
      if(e.key === "Escape"){
        closeAboutMenu();
      }
    });

    menu.querySelectorAll("a").forEach(function(a){
      a.addEventListener("click", function(){
        closeAboutMenu();
      });
    });
  }

  const btn = document.getElementById("navToggle");
  const panel = document.getElementById("mobilePanel");
  const aboutGroup = document.getElementById("mobileAboutGroup");
  const aboutToggle = document.getElementById("mobileAboutToggle");

  if(btn && panel){
    function closeAbout(){
      if(!aboutGroup || !aboutToggle) return;
      aboutGroup.classList.remove("open");
      aboutToggle.setAttribute("aria-expanded","false");
    }

    function toggleAbout(){
      if(!aboutGroup || !aboutToggle) return;
      const open = aboutGroup.classList.toggle("open");
      aboutToggle.setAttribute("aria-expanded", open ? "true" : "false");
    }

    function closeMobilePanel(){
      panel.classList.remove("open");
      panel.setAttribute("aria-hidden","true");
      btn.setAttribute("aria-expanded","false");
      closeAbout();
    }

    btn.addEventListener("click", ()=>{
      const open = panel.classList.toggle("open");
      panel.setAttribute("aria-hidden", open ? "false" : "true");
      btn.setAttribute("aria-expanded", open ? "true" : "false");
      if(!open) closeAbout();
    });

    if(aboutToggle){
      aboutToggle.addEventListener("click", (e)=>{
        e.preventDefault();
        e.stopPropagation();
        toggleAbout();
      });
    }

    panel.querySelectorAll("a").forEach(a => a.addEventListener("click", closeMobilePanel));

    document.addEventListener("keydown", (e)=>{
      if(e.key === "Escape") closeMobilePanel();
    });

    document.addEventListener("click", (e)=>{
      if(panel.classList.contains("open")){
        const header = document.querySelector("header");
        if(header && header.contains(e.target)) return;
        if(panel.contains(e.target)) return;
        closeMobilePanel();
      }
    });

    window.addEventListener("resize", ()=>{
      if(window.innerWidth >= 769) closeMobilePanel();
    }, { passive:true });
  }
}

function togglePassword(id, icon){
  const input = document.getElementById(id);
  const show = input.type === "password";
  input.type = show ? "text" : "password";
  icon.classList.toggle("fa-eye");
  icon.classList.toggle("fa-eye-slash");
}

document.getElementById("resetForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const pw = document.getElementById("newPassword").value.trim();
  const cpw = document.getElementById("confirmPassword").value.trim();
  const error = document.getElementById("errorMsg");
  const success = document.getElementById("successMsg");

  error.textContent = "";
  success.style.display = "none";

  if(!sb){
    error.textContent = "Supabase client is not initialized. Check supabase_config.js.";
    return;
  }

  if(pw !== cpw){
    error.textContent = "Passwords do not match.";
    return;
  }

  if(pw.length < 6){
    error.textContent = "Password must be at least 6 characters.";
    return;
  }

  const { error: updateErr } = await sb.auth.updateUser({ password: pw });

  if(updateErr){
    error.textContent = "Error: " + updateErr.message;
    return;
  }

  success.style.display = "block";
  setTimeout(() => window.location.href = "login.html", 2000);
});

document.addEventListener("DOMContentLoaded", () => {
  initHeaderMenus();
});
</script>
